services:
  palantir-console:
    build: .
    ports:
      - "${PORT:-4177}:${PORT:-4177}"
    environment:
      PORT: ${PORT:-4177}
      PALANTIR_TOKEN: ${PALANTIR_TOKEN:-}
      PALANTIR_ALLOWED_COMMANDS: ${PALANTIR_ALLOWED_COMMANDS:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      OPENCODE_STORAGE: /data/opencode/storage
      OPENCODE_BIN: opencode
    volumes:
      - palantir-data:/app/data
      - ${OPENCODE_STORAGE_HOST:-/dev/null}:/data/opencode/storage:ro
    restart: unless-stopped

volumes:
  palantir-data:
