<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Palantir Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Design tokens MUST load before styles.css; the rest of the stylesheet
         consumes the CSS variables defined there. -->
    <link rel="stylesheet" href="styles/tokens.css" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" defer></script>
    <!--
      Phase 4 (frontend ESM split): app/main.js is the new ES-module entry.
      It uses fully relative paths to the vendor ESM bundles (no import map),
      so the existing CSP `script-src 'self'` policy keeps working without
      adding `'unsafe-inline'` for an inline importmap. The bare `"preact"`
      specifier inside vendor/hooks.module.js was rewritten to a relative
      path for the same reason — see the patch comment in that file.
    -->
    <script type="module" src="app/main.js"></script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
