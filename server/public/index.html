<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Phase K-2b (2026-04-28): mobile browser chrome color tracks
         the active theme. Two media-scoped meta tags let the OS pick
         the right one without JS — `dark` matches `--bg-base #09090b`,
         `light` matches `--bg-base #fafafa`. K-2c's theme-init.js
         updates the active value when the user explicitly toggles. -->
    <meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <title>Palantir Console</title>
    <!-- Phase K-2c (2026-04-28): theme bootstrap MUST run before any
         stylesheet so the `[data-theme="..."]` selector is in place
         on first paint (no FOUC). Sync, no-defer, ahead of every
         <link rel="stylesheet">. CSP-safe (script-src 'self'). -->
    <script src="theme-init.js"></script>
    <link rel="stylesheet" href="styles/fonts.css" />
    <!-- Design tokens MUST load before styles.css; the rest of the stylesheet
         consumes the CSS variables defined there. -->
    <link rel="stylesheet" href="styles/tokens.css" />
    <link rel="stylesheet" href="styles.css" />
    <!-- PR1 / P0-1: marked + DOMPurify self-hosted in vendor/. Previously
         these loaded from cdn.jsdelivr.net, which required relaxing CSP
         script-src to include the CDN. Self-hosting lets us tighten CSP
         back to 'self' and removes a third-party runtime dependency. -->
    <script src="vendor/marked.min.js" defer></script>
    <script src="vendor/purify.min.js" defer></script>
    <!--
      Phase 4 (frontend ESM split): app/main.js is the new ES-module entry.
      It uses fully relative paths to the vendor ESM bundles (no import map),
      so the existing CSP `script-src 'self'` policy keeps working without
      adding `'unsafe-inline'` for an inline importmap. The bare `"preact"`
      specifier inside vendor/hooks.module.js was rewritten to a relative
      path for the same reason — see the patch comment in that file.
    -->
    <script type="module" src="app/main.js"></script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
