<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="referrer" content="no-referrer" />
  <!-- Phase K-2b (2026-04-28): mobile chrome color tracks the active
       theme on the login screen too. Same `media="..."` pair as the
       SPA index.html so the OS picks the right color before login.
       SPA's K-2c theme-init.js doesn't run here (login is intentionally
       script-light), so we rely on system prefers-color-scheme alone. -->
  <meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
  <title>Sign in — Palantir Console</title>
  <!-- Phase K-2c (2026-04-28): same theme bootstrap as the SPA so the
       login screen also picks up the user's last theme choice on
       first paint. The script is tiny and idempotent. -->
  <script src="theme-init.js"></script>
  <link rel="stylesheet" href="styles/fonts.css" />
  <link rel="stylesheet" href="styles/tokens.css" />
  <style>
    /* Self-contained — we intentionally don't pull styles.css so this page
       has zero SPA coupling and loads instantly on first visit. Uses only
       design tokens that are defined in tokens.css.
       Phase K-2b (2026-04-28): migrated off the bespoke `--color-*` token
       names (which were never defined in tokens.css and only worked via
       fallback hex) onto the canonical `--bg-base` / `--text-primary` /
       etc. so the login page picks up `[data-theme="light"]` automatically
       once K-2c/K-2d activate user toggle and system prefers respectively.
       `color-scheme: light dark` stays so native form controls follow OS
       on this script-light page even before the SPA toggle exists. */
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    .card {
      width: 100%;
      max-width: 380px;
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg-elevated);
    }
    h1 { margin: 0 0 4px; font-size: 20px; font-weight: 600; }
    p.sub { margin: 0 0 24px; color: var(--text-muted); font-size: 13px; }
    label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    input[type="password"] {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm-plus);
      background: var(--bg-base);
      color: inherit;
      font-family: inherit;
      font-size: 14px;
    }
    button {
      margin-top: 16px;
      width: 100%;
      padding: 10px 12px;
      border-radius: var(--radius-sm-plus);
      border: none;
      background: var(--accent);
      color: var(--text-inverse);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: wait; }
    .error {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      background: var(--status-failed-bg-subtle);
      color: var(--status-failed);
      font-size: 13px;
      display: none;
    }
    .error.visible { display: block; }
  </style>
</head>
<body>
  <form class="card" id="login">
    <h1>Palantir Console</h1>
    <p class="sub">Enter your <code>PALANTIR_TOKEN</code> to continue.</p>
    <label for="token">Token</label>
    <input id="token" name="token" type="password" autocomplete="current-password" autofocus required />
    <button type="submit" id="submit">Sign in</button>
    <div class="error" id="err"></div>
  </form>
  <!-- External file (not inline): the CSP is `script-src 'self'` with no
       'unsafe-inline'/nonce, so an inline handler would be blocked and the form
       would fall back to a native GET that never authenticates. -->
  <script src="login.js"></script>
</body>
</html>
